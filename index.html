<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITC Wordle Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #121213; color: white; }
        #grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 50px; height: 50px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-transform: uppercase; }
        .Correct { background-color: #538d4e; border-color: #538d4e; }
        .Present { background-color: #b59f3b; border-color: #b59f3b; }
        .Absent { background-color: #3a3a3c; border-color: #3a3a3c; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: none; outline: none; text-align: center; width: 150px; }
    </style>
</head>
<body>

    <h1>NITC Wordle</h1>
    <div id="grid"></div>
    <input type="text" id="guessInput" maxlength="5" placeholder="Type 5 letters..." autofocus>
    <p id="message"></p>

    <script type="module">
        import init, { WordleGame } from './pkg/nitc_wordle.js';

        async function run() {
            // Initialize the webassembly module
            await init();

            // Create a new game with a static secret word for testing
            const game = new WordleGame("space");
            let currentRow = 0;

            // Generate structural grid layout
            const grid = document.getElementById('grid');
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }

            const input = document.getElementById('guessInput');
            const message = document.getElementById('message');

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const guess = input.value.toLowerCase();
                    if (guess.len !== 5) {
                        try {
                            const result = game.submit_guess(guess);
                            const rows = document.querySelectorAll('.row');
                            const tiles = rows[currentRow].children;

                            // Color the tiles based on the state returned by Rust
                            result.forEach((res, index) => {
                                tiles[index].textContent = res.letter;
                                tiles[index].classList.add(res.state);
                            });

                            input.value = '';
                            
                            if (game.is_won()) {
                                message.textContent = "🎉 You Won!";
                                input.disabled = true;
                            } else if (game.is_game_over()) {
                                message.textContent = "Game Over! Better luck next time.";
                                input.disabled = true;
                            } else {
                                currentRow++;
                            }
                        } catch (err) {
                            message.textContent = err;
                        }
                    }
                }
            });
        }
        run();
    </script>
</body>
</html>
