<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITC Wordle Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #121213; color: white; }
        #grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 20px; }
        .row { display: grid; gap: 5px; }
        .tile { width: 50px; height: 50px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-transform: uppercase; }
        .Correct { background-color: #538d4e; border-color: #538d4e; }
        .Present { background-color: #b59f3b; border-color: #b59f3b; }
        .Absent { background-color: #3a3a3c; border-color: #3a3a3c; }
        
        .controls-container { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: none; outline: none; text-align: center; width: 200px; }
        
        /* Admin Block Button Styling */
        #blacklistBtn {
            background-color: transparent;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #blacklistBtn:hover {
            background-color: #ff4d4d;
            color: white;
        }
    </style>
</head>
<body>

    <h1>NITC Wordle</h1>
    <div id="grid"></div>
    
    <div class="controls-container">
        <input type="text" id="guessInput" placeholder="Loading game data..." disabled autofocus>
        <!-- Button is strictly hidden by default -->
        <button id="blacklistBtn" style="display: none;">Block & Skip Word (Admin Only)</button>
    </div>
    
    <p id="message"></p>

    <script type="module">
        import init, { WordleGame } from './pkg/nitc_wordle.js';

        // Set your private admin password here
        const ADMIN_PASSWORD = "opensesame"; 

        // Expanded fallback dictionary of 50 campus, engineering, and student life words
        const FALLBACK_WORDS = [
            "ragam", "btech", "mtech", "links", "hosts", "clubs", "event", "batch", "board", "smart",
            "grade", "exams", "class", "study", "paper", "score", "major", "minor",
            "bytes", "codes", "stack", "queue", "array", "graph", "trees", "logic", "input",
            "react", "learn", "teach", "coach", "draft", "group", "teams", "bench", "chair",
            "chalk", "books", "tests", "rules", "gates"
        ];

        // Global master blacklist. Update this when you copy-paste new blocked words.
        const STATIC_BLACKLIST = [
            "image", "cargo", "thumb", "width", "align", "files", "photo",
            "notes", "admin", "thats", "which", "there", "their", "about", 
            "would", "could", "write", "print", "under", "other", "order","three", "block", "einis","since", "peyis", "named", "rajan", "srija", "dayis", "libya", "danis", "added", "penis"
        ];

        // Check if the current visitor is the admin
        function isAdmin() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('admin') === ADMIN_PASSWORD;
        }

        // Retrieve local admin blacklist
        function getDynamicBlacklist() {
            try {
                return JSON.parse(localStorage.getItem('nitc_wordle_blacklist')) || [];
            } catch (e) {
                return [];
            }
        }

        // Add word to blocklist, show copy-paste code, and reload
        function blacklistWord(word) {
            const currentList = getDynamicBlacklist();
            if (word && !currentList.includes(word)) {
                currentList.push(word);
                localStorage.setItem('nitc_wordle_blacklist', JSON.stringify(currentList));
            }

            // Generate updated array to make it easy for you to copy-paste into STATIC_BLACKLIST
            const mergedList = [...new Set([...STATIC_BLACKLIST, ...currentList])];
            const formattedArray = JSON.stringify(mergedList);

            alert(
                `🚫 Word "${word.toUpperCase()}" Blocked locally!\n\n` +
                `To make this global for EVERYONE, copy this array and paste it over STATIC_BLACKLIST in your index.html:\n\n` +
                `${formattedArray}`
            );

            window.location.reload(); 
        }

        // Pulls exactly 5 random pages in 1 query, filters them, and picks 1 random word
        async function fetchSingleCampusWord() {
            const URL = `https://wiki.fosscell.org/api.php?action=query&generator=random&grnnamespace=0&grnlimit=5&prop=revisions&rvprop=content&format=json&origin=*`;

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000); 

            // Combine code-level blocks with admin's dynamic local blocks
            const activeBlacklist = [...STATIC_BLACKLIST, ...getDynamicBlacklist()];

            try {
                const response = await fetch(URL, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const masterWordPool = [];

                if (data && data.query && data.query.pages) {
                    for (const pageId in data.query.pages) {
                        const page = data.query.pages[pageId];
                        const title = (page.title || "").trim();
                        const lowercaseTitle = title.toLowerCase();

                        // 1. Namespace guard
                        if (page.ns !== 0) continue;

                        // 2. Structural/Explicit block rule
                        if (
                            lowercaseTitle.startsWith("user:") || 
                            lowercaseTitle.startsWith("user talk:") ||
                            lowercaseTitle.startsWith("category:") ||
                            lowercaseTitle.startsWith("template:") ||
                            lowercaseTitle.includes("user") ||       
                            lowercaseTitle.includes("member") ||     
                            title.includes("/")                      
                        ) {
                            continue;
                        }

                        // 3. Multi-word title guard
                        const titleWords = title.split(/\s+/);
                        if (titleWords.length >= 3) continue;

                        let pageText = title + " ";
                        let rawContent = "";

                        if (page.revisions && page.revisions[0]) {
                            const rev = page.revisions[0];
                            rawContent = rev["*"] || rev.content || "";
                            pageText += rawContent;
                        }

                        // 4. Bio Metadata guard
                        const lowercaseContent = rawContent.toLowerCase();
                        if (
                            lowercaseContent.includes("category:members") ||
                            lowercaseContent.includes("category:people") ||
                            lowercaseContent.includes("category:contributors") ||
                            lowercaseContent.includes("{{member") ||
                            lowercaseContent.includes("{{profile")
                        ) {
                            continue; 
                        }

                        // 5. Gather all eligible words
                        const words = pageText.split(/[\s_]+/);
                        for (let i = 0; i < words.length; i++) {
                            const cleanWord = words[i].replace(/[^a-zA-Z]/g, "").toLowerCase();
                            
                            if (cleanWord.length === 5 && !activeBlacklist.includes(cleanWord)) {
                                masterWordPool.push(cleanWord);
                            }
                        }
                    }
                }

                if (masterWordPool.length > 0) {
                    const randomIndex = Math.floor(Math.random() * masterWordPool.length);
                    const selectedWord = masterWordPool[randomIndex];
                    console.log(`🎯 Successfully pooled words across random pages.`);
                    return selectedWord;
                }

                throw new Error("No clean 5-letter words found on any of the queried pages.");
            } catch (err) {
                clearTimeout(timeoutId);
                const fallback = FALLBACK_WORDS[Math.floor(Math.random() * FALLBACK_WORDS.length)];
                console.warn("⚠️ Filter active or fetch failed. Fallback used:", fallback, `(${err.message})`);
                return fallback;
            }
        }

        async function run() {
            try {
                await init();
                const secretWord = await fetchSingleCampusWord();
                console.log(`🎲 Active Match Word: "${secretWord.toUpperCase()}"`);

                const game = new WordleGame(secretWord);
                const wordLength = game.get_word_length();
                let currentRow = 0;

                const input = document.getElementById('guessInput');
                const blacklistBtn = document.getElementById('blacklistBtn');

                input.disabled = false;
                input.setAttribute('maxlength', wordLength);
                input.setAttribute('placeholder', `Type ${wordLength} letters...`);
                input.focus();

                // Only reveal the Block button if visiting with ?admin=opensesame URL parameter
                if (isAdmin()) {
                    blacklistBtn.style.display = "block";
                    blacklistBtn.onclick = () => blacklistWord(secretWord);
                }

                const grid = document.getElementById('grid');
                grid.innerHTML = ''; 
                for (let i = 0; i < 6; i++) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    row.style.gridTemplateColumns = `repeat(${wordLength}, 1fr)`;
                    
                    for (let j = 0; j < wordLength; j++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        row.appendChild(tile);
                    }
                    grid.appendChild(row);
                }

                const message = document.getElementById('message');
                input.replaceWith(input.cloneNode(true)); 
                const newLiveInput = document.getElementById('guessInput');

                newLiveInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const guess = newLiveInput.value.toLowerCase();
                        if (guess.length === wordLength) {
                            try {
                                message.textContent = '';
                                const result = game.submit_guess(guess);
                                const rows = document.querySelectorAll('.row');
                                const tiles = rows[currentRow].children;

                                result.forEach((res, index) => {
                                    tiles[index].textContent = res.letter;
                                    tiles[index].classList.add(res.state);
                                });

                                newLiveInput.value = '';
                                
                                if (game.is_won()) {
                                    message.textContent = "🎉 You Won!";
                                    newLiveInput.disabled = true;
                                    blacklistBtn.style.display = "none";
                                } else if (game.is_game_over()) {
                                    message.textContent = `Game Over! The word was: ${game.get_secret_word().toUpperCase()}`;
                                    newLiveInput.disabled = true;
                                    blacklistBtn.style.display = "none";
                                } else {
                                    currentRow++;
                                }
                            } catch (err) {
                                message.textContent = err;
                            }
                        } else {
                            message.textContent = `Word must be exactly ${wordLength} letters.`;
                        }
                    }
                });
            } catch (initErr) {
                document.getElementById('message').textContent = "Initialization failed.";
                console.error(initErr);
            }
        }
        run();
    </script>
</body>
</html>
