<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITC Wordle Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #121213; color: white; }
        #grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 20px; }
        .row { display: grid; gap: 5px; }
        .tile { width: 50px; height: 50px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-transform: uppercase; }
        .Correct { background-color: #538d4e; border-color: #538d4e; }
        .Present { background-color: #b59f3b; border-color: #b59f3b; }
        .Absent { background-color: #3a3a3c; border-color: #3a3a3c; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: none; outline: none; text-align: center; width: 200px; }
    </style>
</head>
<body>

    <h1>NITC Wordle</h1>
    <div id="grid"></div>
    <input type="text" id="guessInput" placeholder="Loading game data..." disabled autofocus>
    <p id="message"></p>

    <script type="module">
        import init, { WordleGame } from './pkg/nitc_wordle.js';

        // Single-word fallbacks
        const FALLBACK_WORDS = ["ragam", "btech", "mtech", "links", "hosts", "clubs", "event", "batch", "board", "smart"];

        // Expanded blacklist to filter out metadata, common pronouns, and non-topic words
        const BLACKLIST = [
            "image", "cargo", "thumb", "width", "align", "files", "photo",
            "notes", "admin", "thats", "which", "there", "their", "about", 
            "would", "could", "write", "print", "under", "other"
        ];

        // Pulls exactly 1 random page and extracts the first matching 5-letter word
        async function fetchSingleCampusWord() {
            const URL = `https://wiki.fosscell.org/api.php?action=query&generator=random&grnnamespace=0&grnlimit=1&prop=revisions&rvprop=content&format=json&origin=*`;

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2500); 

            try {
                const response = await fetch(URL, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                if (data && data.query && data.query.pages) {
                    for (const pageId in data.query.pages) {
                        const page = data.query.pages[pageId];
                        let pageText = (page.title || "") + " ";

                        if (page.revisions && page.revisions[0]) {
                            const rev = page.revisions[0];
                            pageText += rev["*"] || rev.content || "";
                        }

                        // Tokenize and hunt for the first valid 5-letter word
                        const words = pageText.split(/[\s_]+/);
                        for (let i = 0; i < words.length; i++) {
                            const cleanWord = words[i].replace(/[^a-zA-Z]/g, "").toLowerCase();
                            
                            // Check if word is 5 letters long AND is not blacklisted
                            if (cleanWord.length === 5 && !BLACKLIST.includes(cleanWord)) {
                                console.log(`🎯 Found matching word on page: "${cleanWord.toUpperCase()}"`);
                                return cleanWord; 
                            }
                        }
                    }
                }
                throw new Error("No clean 5-letter words found on this page.");
            } catch (err) {
                clearTimeout(timeoutId);
                const fallback = FALLBACK_WORDS[Math.floor(Math.random() * FALLBACK_WORDS.length)];
                console.warn("⚠️ Single fetch fallback used:", fallback, `(${err.message})`);
                return fallback;
            }
        }

        async function run() {
            try {
                await init();
                const secretWord = await fetchSingleCampusWord();
                console.log(`🎲 Active Match Word: "${secretWord.toUpperCase()}"`);

                const game = new WordleGame(secretWord);
                const wordLength = game.get_word_length();
                let currentRow = 0;

                const input = document.getElementById('guessInput');
                input.disabled = false;
                input.setAttribute('maxlength', wordLength);
                input.setAttribute('placeholder', `Type ${wordLength} letters...`);
                input.focus();

                const grid = document.getElementById('grid');
                grid.innerHTML = ''; 
                for (let i = 0; i < 6; i++) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    row.style.gridTemplateColumns = `repeat(${wordLength}, 1fr)`;
                    
                    for (let j = 0; j < wordLength; j++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        row.appendChild(tile);
                    }
                    grid.appendChild(row);
                }

                const message = document.getElementById('message');
                input.replaceWith(input.cloneNode(true)); 
                const newLiveInput = document.getElementById('guessInput');

                newLiveInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const guess = newLiveInput.value.toLowerCase();
                        if (guess.length === wordLength) {
                            try {
                                message.textContent = '';
                                const result = game.submit_guess(guess);
                                const rows = document.querySelectorAll('.row');
                                const tiles = rows[currentRow].children;

                                result.forEach((res, index) => {
                                    tiles[index].textContent = res.letter;
                                    tiles[index].classList.add(res.state);
                                });

                                newLiveInput.value = '';
                                
                                if (game.is_won()) {
                                    message.textContent = "🎉 You Won!";
                                    newLiveInput.disabled = true;
                                } else if (game.is_game_over()) {
                                    message.textContent = `Game Over! The word was: ${game.get_secret_word().toUpperCase()}`;
                                    newLiveInput.disabled = true;
                                } else {
                                    currentRow++;
                                }
                            } catch (err) {
                                message.textContent = err;
                            }
                        } else {
                            message.textContent = `Word must be exactly ${wordLength} letters.`;
                        }
                    }
                });
            } catch (initErr) {
                document.getElementById('message').textContent = "Initialization failed.";
                console.error(initErr);
            }
        }
        run();
    </script>
</body>
</html>
