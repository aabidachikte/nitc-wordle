<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITC Wordle Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #121213; color: white; }
        #grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 20px; }
        .row { display: grid; gap: 5px; }
        .tile { width: 50px; height: 50px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-transform: uppercase; }
        .Correct { background-color: #538d4e; border-color: #538d4e; }
        .Present { background-color: #b59f3b; border-color: #b59f3b; }
        .Absent { background-color: #3a3a3c; border-color: #3a3a3c; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: none; outline: none; text-align: center; width: 200px; }
    </style>
</head>
<body>

    <h1>NITC Wordle</h1>
    <div id="grid"></div>
    <input type="text" id="guessInput" placeholder="Loading game data..." disabled autofocus>
    <p id="message"></p>

    <script type="module">
        import init, { WordleGame } from './pkg/nitc_wordle.js';

        // 20 Hardcoded backup campus words as a safety net
        const FALLBACK_WORDS = [
            "hostel", "campus", "library", "btech", "mtech", 
            "ragam", "tathva", "canteen", "server", "degree",
            "faculty", "alumni", "ncccat", "nlhc", "sambhram",
            "chanakya", "aryabhatta", "mbahall", "lhgnd", "mega"
        ];

        // 1. Fetch random page titles from the MediaWiki API and isolate single words
        async function fetchCampusWords() {
            const URL = "https://wiki.fosscell.org/api.php?action=query&list=random&rnnamespace=0&rnlimit=50&format=json&origin=*";
            try {
                const response = await fetch(URL);
                const data = await response.json();
                
                const rawTitles = data.query.random.map(page => page.title);
                let validWords = [];

                rawTitles.forEach(title => {
                    // Split multi-word strings by spaces or underscores
                    const words = title.split(/[\s_]+/);
                    words.forEach(word => {
                        // Strip out special characters, keeping pure alphabet strings
                        const cleanWord = word.replace(/[^a-zA-Z]/g, "").toLowerCase();
                        if (cleanWord.length >= 5 && cleanWord.length <= 8) {
                            validWords.push(cleanWord);
                        }
                    });
                });

                console.log("🎯 Harvested Wiki Words Pool:", validWords);

                if (validWords.length === 0) {
                    console.warn("⚠️ No wiki words met length rules. Injecting fallback array.");
                    return FALLBACK_WORDS;
                }
                return validWords;
            } catch (error) {
                console.error("❌ MediaWiki connection failed. Falling back gracefully.", error);
                return FALLBACK_WORDS;
            }
        }

        // 2. Deterministically select today's word based on a calendar date seed hash
        function pickDailyWord(wordList) {
            const today = new Date();
            const dateSeed = (today.getFullYear() * 10000) + ((today.getMonth() + 1) * 100) + today.getDate();
            
            // Simple robust linear hash function to get identical results for all players today
            let hash = 0;
            const seedStr = dateSeed.toString();
            for (let i = 0; i < seedStr.length; i++) {
                hash = (hash << 5) - hash + seedStr.charCodeAt(i);
                hash |= 0; 
            }
            
            const selectedIndex = Math.abs(hash) % wordList.length;
            const secretWord = wordList[selectedIndex];
            
            // Helpful debug helper for development testing
            console.log(`🔒 Today's Calendar Seed: ${dateSeed} | Chosen Word: "${secretWord.toUpperCase()}"`);
            return secretWord;
        }

        async function run() {
            // Wait for both the WebAssembly compilation and the Wiki API network handshake
            await init();
            const wordPool = await fetchCampusWords();
            const secretWord = pickDailyWord(wordPool);

            // Pass the generated secret word into the updated Rust WASM Constructor
            const game = new WordleGame(secretWord);
            const wordLength = game.get_word_length();
            let currentRow = 0;

            const input = document.getElementById('guessInput');
            input.disabled = false;
            input.setAttribute('maxlength', wordLength);
            input.setAttribute('placeholder', `Type ${wordLength} letters...`);
            input.focus();

            const grid = document.getElementById('grid');
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.style.gridTemplateColumns = `repeat(${wordLength}, 1fr)`;
                
                for (let j = 0; j < wordLength; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }

            const message = document.getElementById('message');

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const guess = input.value.toLowerCase();
                    if (guess.length === wordLength) {
                        try {
                            message.textContent = '';
                            const result = game.submit_guess(guess);
                            const rows = document.querySelectorAll('.row');
                            const tiles = rows[currentRow].children;

                            result.forEach((res, index) => {
                                tiles[index].textContent = res.letter;
                                tiles[index].classList.add(res.state);
                            });

                            input.value = '';
                            
                            if (game.is_won()) {
                                message.textContent = "🎉 You Won!";
                                input.disabled = true;
                            } else if (game.is_game_over()) {
                                message.textContent = `Game Over! The word was: ${game.get_secret_word().toUpperCase()}`;
                                input.disabled = true;
                            } else {
                                currentRow++;
                            }
                        } catch (err) {
                            message.textContent = err;
                        }
                    } else {
                        message.textContent = `Word must be exactly ${wordLength} letters.`;
                    }
                }
            });
        }
        run();
    </script>
</body>
</html>
